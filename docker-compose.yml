services:
  api:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    command: sh -c "bun run seed && bun run index.ts"
    ports:
      - "3001:3001"
    env_file:
      - apps/server/.env
    depends_on:
      - mongo
      - valkey
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/server/node_modules
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    command: bun run worker.js
    env_file:
      - apps/server/.env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/
      - REDIS_HOST=valkey
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - mongo
      - valkey
      - qdrant
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/server/node_modules
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  valkey:
    image: valkey/valkey
    ports:
      - "6379:6379"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/pwa/Dockerfile
    command: bun run dev --host 0.0.0.0
    ports:
      - "5173:5173"
    env_file:
      - apps/pwa/.env
    depends_on:
      - api
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/pwa/node_modules
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    restart: unless-stopped

volumes:
  mongo_data:
